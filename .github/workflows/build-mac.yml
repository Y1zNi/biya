name: Build macOS arm64

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-14
    env:
      CODESIGN_APP: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Homebrew, includes tkinter)
        run: |
          brew install python@3.12
          echo "$(brew --prefix python@3.12)/bin" >> "$GITHUB_PATH"
          python3.12 --version
          python3.12 -c "import tkinter; print('tkinter ok', tkinter.TkVersion)"

      - name: Build .app bundle
        run: python3.12 build_mac.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SocialMediaTool-mac-arm64
          path: release/SocialMediaTool-mac-arm64.zip
